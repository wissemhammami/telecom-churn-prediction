services:
  - type: web
    name: churn-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.serving.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"

  - type: web
    name: churn-streamlit
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"